<!DOCTYPE html>

<html lang="ar">
<head>
<meta charset="UTF-8">
<title>نشرة السوق</title>

<style>
body {
    margin: 0;
    background: white;
    text-align: center;
}

/* زر PDF */
button {
    position: fixed;
    top: 10px;
    right: 10px;
    padding: 10px 15px;
    background: #0078d4;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

/* الصور فقط */
img {
    width: 100%;
    display: block;
}

/* الطباعة */
@page {
    size: A4;
    margin: 0;
}

@media print {
    button {
        display: none;
    }
}
</style>

</head>

<body>

<button onclick="window.print()">تحميل PDF</button>

<img src="1.png">
<img src="2.png">
</body>
</html>
