<!DOCTYPE html>

<html lang="ar">
<head>
<meta charset="UTF-8">
<title>نشرة السوق</title>

<style>
body {
    margin: 0;
    background: white;
    font-family: Arial, sans-serif;
}

/* زر تحميل PDF */
button {
    position: fixed;
    top: 10px;
    right: 10px;
    padding: 10px 15px;
    background: #0078d4;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    z-index: 1000;
}

/* كل صفحة A4 */
.page {
    width: 210mm;
    height: 297mm;
    margin: 0 auto;
    page-break-after: always;
}

/* الصورة تملأ الصفحة بدون فراغ */
img {
    width: 100%;
    height: 100%;
    object-fit: fill;
}

/* إعدادات الطباعة */
@page {
    size: A4;
    margin: 0;
}

@media print {
    button {
        display: none;
    }
    body {
        margin: 0;
    }
    .page {
        margin: 0;
        page-break-after: always;
    }
}
</style>

</head>

<body>

<!-- زر تحميل PDF -->

<button onclick="window.print()">تحميل PDF</button>

<div class="page">
    <img src="1.png">
</div>

<div class="page">
    <img src="2.png">
</div>

<div class="page">
    <img src="3.png">
</div>

<div class="page">
    <img src="4.png">
</div>

</body>
</html>
